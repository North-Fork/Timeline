name: Weekly CV update

# Runs every Monday at 06:00 UTC.
# Can also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Timeline-AbTeC-Media
        uses: actions/checkout@v4
        with:
          ref: Timeline-AbTeC-Media
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openpyxl beautifulsoup4

      - name: Fetch CV from Google Docs → cv-data.js
        working-directory: data/cv-data
        run: python3 fetch_cv_from_gdoc.py

      - name: Update publication cover image lookup → pub-images.js
        working-directory: data/cv-data
        run: python3 fetch_pub_images.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cv-data/cv-data.js data/cv-data/pub-images.js
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "Auto-update CV data (weekly)"
            git push
          fi
