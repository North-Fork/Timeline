const noembedCache = new Map();

async function fetchNoembed(url) {
  if (noembedCache.has(url)) return noembedCache.get(url);
  const res  = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(url)}`);
  const data = await res.json();
  noembedCache.set(url, data);
  return data;
}

function preloadAdjacent() {
  const vis = getVisibleEvents();
  const idx = vis.findIndex(e => e.id === activeDrawerId);
  [idx - 1, idx + 1].forEach(i => {
    if (i >= 0 && i < vis.length) {
      const ev = vis[i];
      if (ev.media && /flickr\.com/.test(ev.media) && !noembedCache.has(ev.media))
        fetchNoembed(ev.media).catch(() => {});
    }
  });
}

function getVisibleEvents() {
  return events.filter(e => {
    if (!groupVis.has(e.group)) return false;
    const noTags = orgs.length === 0 && programs.length === 0 && projects.length === 0;
    if (noTags) return true;
    const hasTag = e.org !== '' || e.program !== '' || e.project !== '';
    if (!hasTag) return true;
    return (e.org     !== '' && orgVis.has(e.org))         ||
           (e.program !== '' && programVis.has(e.program)) ||
           (e.project !== '' && projVis.has(e.project));
  }).sort((a, b) => a.startTs - b.startTs);
}

async function renderMedia(ev, container) {
  container.innerHTML = '';

  const url   = ev.media || '';
  const thumb = ev.mediaThumbnail || '';
  const targetId = ev.id;

  const metaHtml = (caption, credit) => {
    let html = '';
    if (caption) html += `<div class="d-media-caption">${caption}</div>`;
    if (credit)  html += `<div class="d-media-credit">${credit}</div>`;
    return html;
  };

  // Build video HTML (sync)
  let vidHtml = '';
  const ytMatch = url.match(/(?:youtube\.com\/(?:watch\?.*v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (ytMatch) {
    vidHtml = `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" allowfullscreen></iframe>`;
  } else {
    const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
    if (vimeoMatch) vidHtml = `<iframe src="https://player.vimeo.com/video/${vimeoMatch[1]}" allowfullscreen></iframe>`;
  }

  // Case 1: video present → embed only, ignore thumbnail
  if (vidHtml) {
    container.innerHTML = vidHtml + metaHtml(ev.mediaCaption, ev.mediaCredit);
    return;
  }

  // Case 1b: direct thumbnail URL → show image (no video)
  if (thumb && /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(thumb)) {
    container.innerHTML = `<img src="${thumb}" alt="${ev.mediaCaption || ''}">${metaHtml(ev.mediaCaption, ev.mediaCredit)}`;
    return;
  }

  // Case 2: direct image URL in media
  if (/\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(url)) {
    container.innerHTML = `<img src="${url}" alt="${ev.mediaCaption || ''}">${metaHtml(ev.mediaCaption, ev.mediaCredit)}`;
    return;
  }

  // Case 3: Flickr → async noembed for image (check media url first, then thumbnail)
  const flickrUrl = /flickr\.com/.test(url) ? url : /flickr\.com/.test(thumb) ? thumb : null;
  if (flickrUrl) {
    container.innerHTML = '<div class="d-media-caption">Loading…</div>';
    try {
      const data   = await fetchNoembed(flickrUrl);
      if (activeDrawerId !== targetId) return;
      const imgUrl = data.media_url || data.thumbnail_url;
      const imgHtml = imgUrl
        ? `<img src="${imgUrl}" alt="${data.title || ''}">`
        : `<a href="${flickrUrl}" target="_blank" style="color:#6366f1">View photo ↗</a>`;
      container.innerHTML = imgHtml + metaHtml(ev.mediaCaption, ev.mediaCredit || data.author_name);
    } catch {
      if (activeDrawerId === targetId)
        container.innerHTML = `<a href="${flickrUrl}" target="_blank" style="color:#6366f1">View photo ↗</a>${metaHtml(ev.mediaCaption, ev.mediaCredit)}`;
    }
    return;
  }

  // Case 5: video only (fallthrough — no image source found)
  if (vidHtml) container.innerHTML = vidHtml + metaHtml(ev.mediaCaption, ev.mediaCredit);
}

function updateDrawerNav() {
  const nav = getNavEvents();
  const idx = nav.findIndex(e => e.id === activeDrawerId);
  btnPrev.disabled = idx <= 0;
  btnNext.disabled = idx < 0 || idx >= nav.length - 1;
}

async function openDrawer(ev) {
  if (activeDrawerId === ev.id) { closeDrawer(); return; }
  const color = groupColor[ev.group] || '#e5e7eb';
  const titleEl = document.getElementById('d-title');
  titleEl.textContent = ev.headline;
  titleEl.style.color = color;
  const duration = ev.end > ev.start
    ? `${fmtDate(ev.start)} → ${fmtDate(ev.end)}`
    : fmtDate(ev.start);
  document.getElementById('d-meta').innerHTML = `<div>${duration}</div><div>${ev.group}</div>`;
  document.getElementById('d-desc').innerHTML = linkify(ev.description || '');
  const moreEl = document.getElementById('d-more');
  moreEl.innerHTML = ev.headlineUrl
    ? `<a href="${ev.headlineUrl}" target="_blank">${ev.headlineLinkLabel || 'More Info'} ↗</a>`
    : '';
  const teamEl = document.getElementById('d-team');
  if (ev.teamMembers) {
    // Parse segments into {role, names} objects
    const parsed = ev.teamMembers.split(';').map(s => s.trim()).filter(Boolean).map(seg => {
      const colon = seg.indexOf(':');
      return colon === -1 ? { role: seg, names: '' } : { role: seg.slice(0, colon).trim(), names: seg.slice(colon + 1).trim() };
    });

    // Collect RA sub-levels
    const RA_LEVELS = [
      { key: 'RA-Undergraduate', label: 'Undergraduate' },
      { key: 'RA-Masters',       label: 'Masters' },
      { key: 'RA-PhD',           label: 'PhD' },
    ];
    const raMap = {};
    RA_LEVELS.forEach(l => { raMap[l.key] = null; });
    parsed.forEach(p => { if (raMap.hasOwnProperty(p.role)) raMap[p.role] = p.names; });
    const hasRA = RA_LEVELS.some(l => raMap[l.key] !== null);
    const raCount = RA_LEVELS.reduce((n, l) => raMap[l.key] !== null ? n + raMap[l.key].split(',').length : n, 0);

    // Non-RA roles in display order
    const NON_RA_ORDER = ['Staff', 'Co-investigator', 'Co-investigators', 'Primary Investigator'];
    const nonRA = NON_RA_ORDER.map(r => parsed.find(p => p.role.toLowerCase() === r.toLowerCase())).filter(Boolean);
    // Also catch any unrecognised roles
    const knownRoles = new Set([...RA_LEVELS.map(l => l.key.toLowerCase()), ...NON_RA_ORDER.map(r => r.toLowerCase())]);
    parsed.filter(p => !knownRoles.has(p.role.toLowerCase())).forEach(p => nonRA.push(p));

    let html = '';

    // Research Assistant block
    if (hasRA) {
      const raLabel = raCount > 1 ? 'Research Assistants' : 'Research Assistant';
      html += `<div class="d-team-group"><span class="d-team-role">${raLabel}</span>`;
      RA_LEVELS.forEach(l => {
        if (raMap[l.key] === null) return;
        const names = raMap[l.key].split(',').map(s => s.trim()).filter(Boolean);
        const namesHtml = names.length === 2
          ? `<span class="d-team-name">${names.join(' and ')}</span>`
          : names.map(n => `<span class="d-team-name">${n}</span>`).join('');
        html += `<div class="d-team-ra-level"><span class="d-team-sublabel">${l.label}</span>${namesHtml}</div>`;
      });
      html += `</div>`;
    }

    // Remaining roles
    const ROLE_PLURAL = {
      'co-investigator':   ['Co-investigator',  'Co-investigators'],
      'co-investigators':  ['Co-investigator',  'Co-investigators'],
      'primary investigator':  ['Primary Investigator', 'Primary Investigators'],
      'primary investigators': ['Primary Investigator', 'Primary Investigators'],
    };
    nonRA.forEach(p => {
      let namesHtml = '';
      let names = [];
      if (p.names) {
        names = p.names.split(',').map(s => s.trim()).filter(Boolean);
        namesHtml = '<br>' + (names.length === 2 ? names.join(' and ') : names.map(n => `<span class="d-team-name">${n}</span>`).join(''));
      }
      const pair = ROLE_PLURAL[p.role.toLowerCase()];
      const label = pair ? (names.length > 1 ? pair[1] : pair[0]) : p.role;
      html += `<div class="d-team-group"><span class="d-team-role">${label}</span>${namesHtml}</div>`;
    });

    teamEl.innerHTML = `<h3>Research Team</h3>${html}`;
  } else {
    teamEl.innerHTML = '';
  }

  const fundersEl = document.getElementById('d-funders');
  if (ev.funders) {
    const funders = ev.funders.split(';').map(s => s.trim()).filter(Boolean);
    const fundersHtml = funders.map(f => `<span class="d-team-name">${f}</span>`).join('');
    fundersEl.innerHTML = `<h3>Funders</h3>${fundersHtml}`;
  } else {
    fundersEl.innerHTML = '';
  }

  // ── Enrichment tags ───────────────────────────────────────────────────
  const renderTags = (elId, tags, cssClass, title) => {
    const el = document.getElementById(elId);
    if (tags && tags.length) {
      const pills = tags.map(t => `<span class="d-tag ${cssClass}">${t}</span>`).join('');
      el.innerHTML = `<div class="d-tags"><h3>${title}</h3><div class="d-tag-list">${pills}</div></div>`;
    } else {
      el.innerHTML = '';
    }
  };
  renderTags('d-themes',        ev.themes,        'theme',        'Themes');
  renderTags('d-concepts',      ev.concepts,      'concept',      'Concepts');
  renderTags('d-collaborators', ev.collaborators, 'collaborator', 'Collaborators');

  activeDrawerId = ev.id;
  drawer.classList.add('open');
  closeMobileSidebar();
  updateDrawerNav();
  await renderMedia(ev, document.getElementById('d-media'));
  preloadAdjacent();
}

// ── Zoom & pan ────────────────────────────────────────────────────────────
const MIN_SCALE = 1e-11;
const MAX_SCALE = 1 / 3600000;

function zoom(factor, pivotX) {
  const tsAt = xToTs(pivotX);
  scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * factor));
  panX  = pivotX - LABEL_W - (tsAt - minTs) * scale;
  redraw();
}

document.getElementById('btn-zoomin').addEventListener('click',  () => zoom(1.5,     wrap.clientWidth / 2));
document.getElementById('btn-zoomout').addEventListener('click', () => zoom(1 / 1.5, wrap.clientWidth / 2));

document.getElementById('btn-today').addEventListener('click', () => {
  panX = wrap.clientWidth - LABEL_W - (Date.now() - minTs) * scale;
  redraw();
});

// ── Search ────────────────────────────────────────────────────────────────
let searchResults = [], searchIdx = -1, searchQuery = '', searchMode = 'absolute';
const searchInput   = document.getElementById('search-input');
const searchCount   = document.getElementById('search-count');
const searchPrev    = document.getElementById('search-prev');
const searchNext    = document.getElementById('search-next');
const searchAbsBtn  = document.getElementById('search-abs');
const searchRelBtn  = document.getElementById('search-rel');

function updateSearchUI() {
  const has = searchResults.length > 0;
  searchPrev.disabled = !has;
  searchNext.disabled = !has;
  searchCount.textContent = has ? `${searchIdx + 1} / ${searchResults.length}` : (searchQuery ? 'No matches' : '');
}

function jumpToEvent(ev) {
  panX = (wrap.clientWidth / 2) - LABEL_W - (ev.startTs - minTs) * scale;
  redraw();
  const rowTop = groupY[ev.group];
  if (rowTop !== undefined) {
    wrap.scrollTop = rowTop - wrap.clientHeight / 2 + (rowHeights[ev.group] || ROW_H) / 2;
  }
  openDrawer(ev);
}

function runSearch(q) {
  searchQuery = q;
  searchResults = events.filter(ev =>
    [ev.headline, ev.description, ev.group, ev.org, ev.program, ev.project, ev.teamMembers, ev.funders]
      .some(f => f && f.toLowerCase().includes(q))
  ).sort((a, b) => a.startTs - b.startTs);

  if (!searchResults.length) { searchIdx = -1; return; }

  if (searchMode === 'relative') {
    // Start from first result at or after the current view centre
    const centreTs = xToTs(LABEL_W + (wrap.clientWidth - LABEL_W) / 2);
    searchIdx = searchResults.findIndex(ev => ev.startTs >= centreTs);
    if (searchIdx === -1) searchIdx = 0; // wrap to beginning if all are in the past
  } else {
    searchIdx = 0;
  }
}

searchInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (!events.length) return;
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults = []; searchIdx = -1; searchQuery = ''; updateSearchUI(); return; }
  if (q !== searchQuery) runSearch(q);
  else if (searchResults.length) searchIdx = (searchIdx + 1) % searchResults.length;
  updateSearchUI();
  if (searchResults.length) jumpToEvent(searchResults[searchIdx]);
});

searchPrev.addEventListener('click', () => {
  if (!searchResults.length) return;
  searchIdx = (searchIdx - 1 + searchResults.length) % searchResults.length;
  updateSearchUI();
  jumpToEvent(searchResults[searchIdx]);
});

searchNext.addEventListener('click', () => {
  if (!searchResults.length) return;
  searchIdx = (searchIdx + 1) % searchResults.length;
  updateSearchUI();
  jumpToEvent(searchResults[searchIdx]);
});

searchAbsBtn.addEventListener('click', () => {
  searchMode = 'absolute';
  searchAbsBtn.classList.add('active');
  searchRelBtn.classList.remove('active');
  searchQuery = ''; // force re-run on next search
});

searchRelBtn.addEventListener('click', () => {
  searchMode = 'relative';
  searchRelBtn.classList.add('active');
  searchAbsBtn.classList.remove('active');
  searchQuery = ''; // force re-run on next search
});

searchInput.addEventListener('input', () => {
  if (!searchInput.value.trim()) { searchResults = []; searchIdx = -1; searchQuery = ''; updateSearchUI(); }
});

let spaceDown = false;
window.addEventListener('keydown', e => { if (e.code === 'Space') { spaceDown = true; e.preventDefault(); } });
window.addEventListener('keyup',   e => { if (e.code === 'Space') spaceDown = false; });

wrap.addEventListener('wheel', e => {
  if (!spaceDown) return;
  e.preventDefault();
  const r = wrap.getBoundingClientRect();
  zoom(e.deltaY < 0 ? 1.15 : 0.87, e.clientX - r.left);
}, { passive: false });

wrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging            = true;
  dragStartX          = e.clientX;
  dragStartPan        = panX;
  dragStartY          = e.clientY;
  dragStartScrollTop  = wrap.scrollTop;
  wrap.classList.add('panning');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX = dragStartPan + (e.clientX - dragStartX);
  wrap.scrollTop = dragStartScrollTop - (e.clientY - dragStartY);
  redraw();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  wrap.classList.remove('panning');
});

// iOS horizontal pan — three-part solution:
// 1. document-level listeners + getBoundingClientRect guard (SVG events don't bubble to HTML)
// 2. {passive:false} + preventDefault for horizontal gestures (stops iOS gesture absorption)
// 3. Reparent touch target before redraw() so innerHTML='' doesn't fire touchcancel;
//    return it invisibly to tlSvg after — iOS keeps tracking the finger; full redraw each frame.
let touchStartX = null, touchStartY = null, touchStartPan = null;
let touchIsH = null, touchLiveDx = 0, touchRaf = null, _touchTargetEl = null;
const _touchAnchor = document.getElementById('_touch_anchor');

// Pinch-to-zoom state
let pinchActive = false, pinchStartDist = null, pinchStartScale = null;
let pinchLiveDist = null, pinchLiveMidX = null, pinchRaf = null;
let _pinchTargetEls = [];

function _pinchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function _reparentIn(els) {
  els.forEach(el => { if (el && tlSvg.contains(el)) _touchAnchor.appendChild(el); });
}
function _reparentOut(els) {
  els.forEach(el => {
    if (el && _touchAnchor.contains(el)) {
      el.setAttribute('visibility', 'hidden');
      tlSvg.appendChild(el);
    }
  });
}

document.addEventListener('touchstart', e => {
  const r = wrap.getBoundingClientRect();
  if (e.touches.length === 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    if (t0.clientX < r.left || t0.clientX > r.right) return;
    pinchActive     = true;
    pinchStartDist  = _pinchDist(e);
    pinchStartScale = scale;
    pinchLiveDist   = pinchStartDist;
    pinchLiveMidX   = ((t0.clientX + t1.clientX) / 2) - r.left;
    _pinchTargetEls = [t0, t1].map(t =>
      (e.target !== tlSvg && tlSvg.contains(e.target)) ? e.target : null
    );
    // Cancel any single-finger pan in progress
    touchStartX = null;
    return;
  }
  const t = e.touches[0];
  if (t.clientX < r.left || t.clientX > r.right || t.clientY < r.top || t.clientY > r.bottom) return;
  touchStartX   = t.clientX;
  touchStartY   = t.clientY;
  touchStartPan = panX;
  touchIsH      = null;
  touchLiveDx   = 0;
  _touchTargetEl = (e.target !== tlSvg && tlSvg.contains(e.target)) ? e.target : null;
}, { passive: true });

document.addEventListener('touchmove', e => {
  // Pinch zoom
  if (pinchActive && e.touches.length === 2) {
    e.preventDefault();
    const r    = wrap.getBoundingClientRect();
    pinchLiveDist = _pinchDist(e);
    pinchLiveMidX = ((e.touches[0].clientX + e.touches[1].clientX) / 2) - r.left;
    if (!pinchRaf) pinchRaf = requestAnimationFrame(() => {
      pinchRaf = null;
      _reparentIn(_pinchTargetEls);
      const factor = pinchLiveDist / pinchStartDist;
      const tsAt   = xToTs(pinchLiveMidX);
      scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchStartScale * factor));
      panX  = pinchLiveMidX - LABEL_W - (tsAt - minTs) * scale;
      redraw();
      _reparentOut(_pinchTargetEls);
    });
    return;
  }
  if (touchStartX === null) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (touchIsH === null && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
    touchIsH = Math.abs(dx) >= Math.abs(dy);
  }
  if (touchIsH) {
    e.preventDefault();
    touchLiveDx = dx;
    if (!touchRaf) touchRaf = requestAnimationFrame(() => {
      touchRaf = null;
      // Move touch target to anchor — keeps it in DOM through innerHTML=''
      if (_touchTargetEl && tlSvg.contains(_touchTargetEl)) _touchAnchor.appendChild(_touchTargetEl);
      panX = touchStartPan + touchLiveDx;
      redraw();
      // Return invisibly so iOS keeps delivering touchmove
      if (_touchTargetEl && _touchAnchor.contains(_touchTargetEl)) {
        _touchTargetEl.setAttribute('visibility', 'hidden');
        tlSvg.appendChild(_touchTargetEl);
      }
    });
  }
}, { passive: false });

function _commitTouch() {
  if (pinchActive) {
    if (pinchRaf) { cancelAnimationFrame(pinchRaf); pinchRaf = null; }
    _reparentIn(_pinchTargetEls);
    redraw();
    pinchActive = false; pinchStartDist = null; pinchStartScale = null;
    pinchLiveDist = null; pinchLiveMidX = null; _pinchTargetEls = [];
  }
  if (touchRaf) { cancelAnimationFrame(touchRaf); touchRaf = null; }
  if (touchIsH && touchStartX !== null) {
    panX = touchStartPan + touchLiveDx;
    // Move phantom element away before final redraw
    if (_touchTargetEl) _touchAnchor.appendChild(_touchTargetEl);
    redraw();
  }
  _touchTargetEl = null;
  touchStartX = null; touchStartY = null; touchStartPan = null;
  touchIsH = null; touchLiveDx = 0;
}
document.addEventListener('touchend',    _commitTouch);
document.addEventListener('touchcancel', _commitTouch);

// ── Crosshair ─────────────────────────────────────────────────────────────
const crosshairLabel = document.getElementById('crosshair-label');
const CROSSHAIR_GAP  = 20;

function hideCrosshair() {
  if (crosshairG) { crosshairG.remove(); crosshairG = null; }
  crosshairLabel.style.display = 'none';
}

wrap.addEventListener('mousemove', e => {
  if (!events.length) return;
  const rect = wrap.getBoundingClientRect();
  const svgX = e.clientX - rect.left;
  if (svgX <= LABEL_W) { hideCrosshair(); return; }

  // Y in #tl-svg coordinates (accounts for sticky header and scroll position)
  const svgY = e.clientY - tlSvg.getBoundingClientRect().top;

  if (crosshairG) crosshairG.remove();
  crosshairG = mk('g', { 'pointer-events': 'none' });
  crosshairG.appendChild(mk('line', {
    x1: svgX, y1: 0, x2: svgX, y2: Math.max(0, svgY - CROSSHAIR_GAP),
    stroke: '#ffffff', 'stroke-opacity': '0.3', 'stroke-width': 1
  }));
  crosshairG.appendChild(mk('line', {
    x1: svgX, y1: svgY + CROSSHAIR_GAP, x2: svgX, y2: crosshairSvgH,
    stroke: '#ffffff', 'stroke-opacity': '0.3', 'stroke-width': 1
  }));
  if (evGRef) tlSvg.insertBefore(crosshairG, evGRef);

  const d = new Date(xToTs(svgX));
  crosshairLabel.textContent   = fmtDate(d);
  crosshairLabel.style.display = 'block';
  const lw     = crosshairLabel.offsetWidth;
  const labelX = (e.clientX + 8 + lw > rect.right) ? e.clientX - lw - 8 : e.clientX + 8;
  crosshairLabel.style.left = labelX + 'px';
  crosshairLabel.style.top  = (rect.top + 4) + 'px';
});
wrap.addEventListener('mouseleave', hideCrosshair);

window.addEventListener('resize', () => { if (events.length) redraw(); });

// ── Watermark vertical centering ──────────────────────────────────────────
function updateWatermarkY() {
  if (!pastWatermarkG) return;
  const mid = wrap.scrollTop + wrap.clientHeight / 2;
  // Left group: centre text (top≈33) + logo (bottom=logoGroupBottom) together
  const dyLeft  = mid - (33 + logoGroupBottom) / 2;
  // Right group: centre just the phrase (baselines 105 / 215, centre≈160)
  const dyRight = mid - 160;
  if (pastWatermarkG)  pastWatermarkG.setAttribute('transform',  `translate(0,${dyLeft})`);
  if (logoWatermarkG)  logoWatermarkG.setAttribute('transform',  `translate(0,${dyLeft})`);
  if (futureWatermarkG) futureWatermarkG.setAttribute('transform', `translate(0,${dyRight})`);
}
wrap.addEventListener('scroll', updateWatermarkY);

// ── Markdown Export ───────────────────────────────────────────────────────
document.getElementById('btn-export-md').addEventListener('click', () => {
  if (!events.length) return;

  const title  = document.getElementById('sidebar-title').textContent;
  const visEvs = getVisibleEvents();

  // Bucket by category, preserving display order
  const byGroup = {};
  for (const e of visEvs) {
    (byGroup[e.group] ??= []).push(e);
  }

  const exportDate = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
  const rangeStart = fmtDate(visEvs[0].start);
  const rangeEnd   = fmtDate(visEvs[visEvs.length - 1].end);
  const lines = [`# ${title}`, '', `*${rangeStart} – ${rangeEnd} · ${visEvs.length} events · exported ${exportDate}*`, ''];

  const visGroups = groups.filter(g => byGroup[g]);
  for (let si = 0; si < visGroups.length; si++) {
    const g    = visGroups[si];
    const evs  = byGroup[g];
    const sNum = si + 1;
    lines.push(`## ${g} (${evs.length})`, '');
    for (let ei = 0; ei < evs.length; ei++) {
      const e       = evs[ei];
      const dateStr = e.end > e.start ? `${fmtDate(e.start)} – ${fmtDate(e.end)}` : fmtDate(e.start);
      lines.push(`- **${sNum}.${ei + 1}** **${dateStr}** — ${e.headline}`);
    }
    lines.push('');
  }

  const blob = new Blob([lines.join('\n')], { type: 'text/markdown' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  const y1md = visEvs[0].start.getFullYear();
  const y2md = visEvs[visEvs.length - 1].end.getFullYear();
  a.download = `AbTeC-Timeline-List-${y1md}-${y2md}.md`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
});

function buildExportSVG(y1, y2) {
  const EXPORT_W       = 1100;
  const EXPORT_LABEL_W = 150;
  const EXPORT_HDR_H   = 36;
  const EXPORT_BTM_H   = 32;
  const TITLE_H        = 28;

  const exportStartTs = new Date(y1, 0, 1).getTime();
  const exportEndTs   = new Date(y2, 11, 31).getTime();
  const exportScale   = (EXPORT_W - EXPORT_LABEL_W) / Math.max(exportEndTs - exportStartTs, 86400000);
  const eTsToX = ts => (ts - exportStartTs) * exportScale + EXPORT_LABEL_W;

  // Same filter logic as redraw()
  const visGroups = groups.filter(g => groupVis.has(g));
  const visEvs = events.filter(e => {
    if (!groupVis.has(e.group)) return false;
    const noTags = orgs.length === 0 && programs.length === 0 && projects.length === 0;
    if (noTags) return true;
    const hasTag = e.org !== '' || e.program !== '' || e.project !== '';
    if (!hasTag) return true;
    return (e.org     !== '' && orgVis.has(e.org))         ||
           (e.program !== '' && programVis.has(e.program)) ||
           (e.project !== '' && projVis.has(e.project));
  });

  // Group Y positions (same logic as redraw)
  const expGroupY = {};
  let expCurY = 0;
  for (const g of visGroups) {
    expGroupY[g] = expCurY;
    expCurY += rowHeights[g] || ROW_H;
  }
  const contentH    = expCurY;
  const contentOffY = TITLE_H + EXPORT_HDR_H;
  const totalH      = contentOffY + contentH + EXPORT_BTM_H;

  const svg = mk('svg', { xmlns: NS, width: EXPORT_W, height: totalH, viewBox: `0 0 ${EXPORT_W} ${totalH}` });

  // Defs: clip for content area
  const defs = mk('defs');
  const cpContent = mk('clipPath', { id: 'expCpContent' });
  cpContent.appendChild(mk('rect', {
    x: EXPORT_LABEL_W, y: contentOffY,
    width: EXPORT_W - EXPORT_LABEL_W, height: contentH
  }));
  defs.appendChild(cpContent);
  svg.appendChild(defs);

  // Background
  svg.appendChild(mk('rect', { x: 0, y: 0, width: EXPORT_W, height: totalH, fill: '#111827' }));

  // Title bar
  const titleText = document.getElementById('sidebar-title').textContent;
  svg.appendChild(mk('rect', { x: 0, y: 0, width: EXPORT_W, height: TITLE_H, fill: '#1f2937' }));
  svg.appendChild(svgTxt(EXPORT_LABEL_W + 6, TITLE_H - 7, titleText, {
    fill: '#f59e0b', 'font-size': 14, 'font-weight': '700', 'letter-spacing': '0.04em'
  }));

  // Header (top axis)
  svg.appendChild(mk('rect', { x: 0, y: TITLE_H, width: EXPORT_W, height: EXPORT_HDR_H, fill: '#1f2937' }));
  svg.appendChild(mk('line', {
    x1: 0, y1: TITLE_H + EXPORT_HDR_H, x2: EXPORT_W, y2: TITLE_H + EXPORT_HDR_H,
    stroke: '#374151', 'stroke-width': 1
  }));
  svg.appendChild(mk('line', {
    x1: EXPORT_LABEL_W, y1: TITLE_H, x2: EXPORT_LABEL_W, y2: TITLE_H + EXPORT_HDR_H,
    stroke: '#374151', 'stroke-width': 1
  }));
  svg.appendChild(svgTxt(12, TITLE_H + EXPORT_HDR_H / 2 + 4, 'CATEGORY', {
    fill: '#4b5563', 'font-size': 10, 'font-weight': '700', 'letter-spacing': '0.08em'
  }));
  drawExportMonthAxis(svg, eTsToX, exportStartTs, exportEndTs,
    EXPORT_W, EXPORT_LABEL_W, TITLE_H, EXPORT_HDR_H, false, 'expCpHdr');

  // Row backgrounds + year grid lines
  const bgG = mk('g', { 'clip-path': 'url(#expCpContent)' });
  visGroups.forEach((g, i) => {
    const y  = contentOffY + expGroupY[g];
    const rh = rowHeights[g] || ROW_H;
    bgG.appendChild(mk('rect', {
      x: EXPORT_LABEL_W, y, width: EXPORT_W - EXPORT_LABEL_W, height: rh,
      fill: i % 2 === 0 ? '#161d2b' : '#111827'
    }));
    bgG.appendChild(mk('line', {
      x1: EXPORT_LABEL_W, y1: y + rh, x2: EXPORT_W, y2: y + rh,
      stroke: '#1f2937', 'stroke-width': 1
    }));
  });
  for (let yr = y1; yr <= y2 + 1; yr++) {
    const x = eTsToX(new Date(yr, 0, 1).getTime());
    if (x >= EXPORT_LABEL_W && x <= EXPORT_W) {
      bgG.appendChild(mk('line', {
        x1: x, y1: contentOffY, x2: x, y2: contentOffY + contentH,
        stroke: '#374151', 'stroke-width': 1
      }));
    }
  }
  svg.appendChild(bgG);

  // Events
  const evG = mk('g', { 'clip-path': 'url(#expCpContent)' });
  for (const ev of visEvs) {
    if (expGroupY[ev.group] === undefined) continue;
    const rY     = contentOffY + expGroupY[ev.group];
    const x1     = eTsToX(ev.startTs);
    const x2     = eTsToX(ev.endTs);
    const barW   = Math.max(x2 - x1, 4);
    const barTop = rY + LANE_PAD + (ev.lane || 0) * LANE_H;
    const color  = groupColor[ev.group];
    evG.appendChild(mk('rect', {
      x: x1, y: barTop, width: barW, height: BAR_H,
      fill: color, rx: 3, opacity: 0.85
    }));
    if (barW > 18) {
      const lx    = Math.max(x1 + 4, EXPORT_LABEL_W + 2);
      const avail = barW - (lx - x1) - 4;
      const maxCh = Math.max(0, Math.floor(avail / 6.5));
      if (maxCh > 1) {
        const label = ev.headline.length > maxCh ? ev.headline.slice(0, maxCh - 1) + '…' : ev.headline;
        evG.appendChild(svgTxt(lx, barTop + BAR_H / 2 + 4, label, {
          fill: '#fff', 'font-size': 10, 'font-weight': '500'
        }));
      }
    }
  }
  svg.appendChild(evG);

  // Today marker
  const todayX = eTsToX(Date.now());
  if (todayX >= EXPORT_LABEL_W && todayX <= EXPORT_W) {
    const tG = mk('g', { 'clip-path': 'url(#expCpContent)' });
    tG.appendChild(mk('line', {
      x1: todayX, y1: contentOffY, x2: todayX, y2: contentOffY + contentH,
      stroke: '#f97316', 'stroke-width': 1.5, 'stroke-dasharray': '4 3'
    }));
    const ta = 5;
    tG.appendChild(mk('polygon', {
      points: `${todayX - ta},${contentOffY} ${todayX + ta},${contentOffY} ${todayX},${contentOffY + ta * 1.6}`,
      fill: '#f97316'
    }));
    svg.appendChild(tG);
  }

  // Label column (always on top of events)
  const lblG = mk('g');
  lblG.appendChild(mk('rect', {
    x: 0, y: contentOffY, width: EXPORT_LABEL_W, height: contentH, fill: '#1f2937'
  }));
  lblG.appendChild(mk('line', {
    x1: EXPORT_LABEL_W, y1: contentOffY, x2: EXPORT_LABEL_W, y2: contentOffY + contentH,
    stroke: '#374151', 'stroke-width': 1
  }));
  visGroups.forEach((g, i) => {
    const y  = contentOffY + expGroupY[g];
    const rh = rowHeights[g] || ROW_H;
    lblG.appendChild(mk('rect', {
      x: 0, y, width: EXPORT_LABEL_W, height: rh,
      fill: i % 2 === 0 ? '#1a2030' : '#161d2b'
    }));
    lblG.appendChild(mk('line', {
      x1: 0, y1: y + rh, x2: EXPORT_LABEL_W, y2: y + rh,
      stroke: '#374151', 'stroke-width': 0.5
    }));
    lblG.appendChild(svgWrappedLabel(12, y + rh / 2, g, 17, { fill: '#d1d5db', 'font-size': 11, 'font-weight': '500' }));
  });
  svg.appendChild(lblG);

  // Bottom axis
  const btmY = contentOffY + contentH;
  svg.appendChild(mk('rect', { x: 0, y: btmY, width: EXPORT_W, height: EXPORT_BTM_H, fill: '#1f2937' }));
  svg.appendChild(mk('line', {
    x1: 0, y1: btmY, x2: EXPORT_W, y2: btmY, stroke: '#374151', 'stroke-width': 1
  }));
  drawExportMonthAxis(svg, eTsToX, exportStartTs, exportEndTs,
    EXPORT_W, EXPORT_LABEL_W, btmY, EXPORT_BTM_H, true, 'expCpBtm');

  return new XMLSerializer().serializeToString(svg);
}

function drawExportMonthAxis(svgEl, eTsToX, startTs, endTs, W, LW, axisY, axisH, fromBottom, cpId) {
  const defs = mk('defs');
  const cp   = mk('clipPath', { id: cpId });
  cp.appendChild(mk('rect', { x: LW, y: axisY, width: W - LW, height: axisH }));
  defs.appendChild(cp);
  svgEl.appendChild(defs);

  const g = mk('g', { 'clip-path': `url(#${cpId})` });
  let d = new Date(new Date(startTs).getFullYear(), 0, 1);
  const endDate = new Date(endTs);
  endDate.setMonth(endDate.getMonth() + 2);

  while (d <= endDate) {
    const x       = eTsToX(d.getTime());
    const mo      = d.getMonth();
    const isJan   = mo === 0;
    const isJuly  = mo === 6;
    const isQuart = mo === 3 || mo === 9;
    const tickLen = isJan ? 16 : isJuly ? 10 : isQuart ? 7 : 4;
    const stroke  = isJan ? '#9ca3af' : (isJuly || isQuart) ? '#6b7280' : '#374151';

    if (x >= LW - 1 && x <= W + 1) {
      if (fromBottom) {
        g.appendChild(mk('line', { x1: x, y1: axisY, x2: x, y2: axisY + tickLen, stroke, 'stroke-width': 2 }));
        if (isJan) {
          g.appendChild(svgTxt(x + 3, axisY + tickLen + 10, String(d.getFullYear()), {
            fill: '#9ca3af', 'font-size': 10, 'font-weight': '600'
          }));
        }
      } else {
        g.appendChild(mk('line', { x1: x, y1: axisY + axisH - tickLen, x2: x, y2: axisY + axisH, stroke, 'stroke-width': 2 }));
        if (isJan) {
          g.appendChild(svgTxt(x + 3, axisY + axisH - tickLen - 3, String(d.getFullYear()), {
            fill: '#9ca3af', 'font-size': 10, 'font-weight': '600'
          }));
        }
      }
    }
    d.setMonth(d.getMonth() + 1);
  }
  svgEl.appendChild(g);
}

// ── Mobile sidebar ────────────────────────────────────────────────────────
const sidebarEl      = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');

function openMobileSidebar() {
  sidebarEl.classList.add('mobile-open');
  sidebarOverlay.classList.add('visible');
}
function closeMobileSidebar() {
  sidebarEl.classList.remove('mobile-open');
  sidebarOverlay.classList.remove('visible');
}
document.getElementById('btn-sidebar-toggle').addEventListener('click', () => {
  sidebarEl.classList.contains('mobile-open') ? closeMobileSidebar() : openMobileSidebar();
});

// ── Filter section (Import/Export) collapse toggle ─────────────────────
const sfToggle = document.getElementById('sf-toggle');
const sfBody   = document.getElementById('sf-body');
const sfArrow  = document.getElementById('sf-arrow');
// Collapse by default on mobile
if (window.matchMedia('(max-width: 767px)').matches) {
  sfBody.classList.add('collapsed');
  sfArrow.classList.remove('open');
}
sfToggle.addEventListener('click', () => {
  const collapsed = sfBody.classList.toggle('collapsed');
  sfArrow.classList.toggle('open', !collapsed);
});
sidebarOverlay.addEventListener('click', closeMobileSidebar);

// Mobile toolbar mirrors sidebar controls
document.getElementById('mob-zoomin') .addEventListener('click', () => document.getElementById('btn-zoomin').click());
document.getElementById('mob-zoomout').addEventListener('click', () => document.getElementById('btn-zoomout').click());
document.getElementById('mob-fit')    .addEventListener('click', () => document.getElementById('btn-fit').click());
document.getElementById('mob-today')  .addEventListener('click', () => document.getElementById('btn-today').click());

</script>
